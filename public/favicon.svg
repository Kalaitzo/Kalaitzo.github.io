<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="23" fill="#0e1020" stroke="#a8d8ea" stroke-width="1.5" opacity="0.95"/>

  <!-- Robot body - simplified biped silhouette -->
  <!-- Head/platform -->
  <rect x="16" y="10" width="16" height="3" rx="1" fill="#a8d8ea"/>

  <!-- ArUco marker pole -->
  <line x1="24" y1="7" x2="24" y2="10" stroke="#89c4c9" stroke-width="1.2"/>
  <rect x="20" y="5" width="8" height="3" rx="0.5" fill="#89c4c9" opacity="0.6"/>

  <!-- String from top -->
  <line x1="24" y1="1" x2="24" y2="7" stroke="#9cc5d4" stroke-width="0.8" stroke-dasharray="1.5,1"/>

  <!-- Torso connectors -->
  <line x1="20" y1="13" x2="20" y2="16" stroke="#a8d8ea" stroke-width="2"/>
  <line x1="28" y1="13" x2="28" y2="16" stroke="#a8d8ea" stroke-width="2"/>

  <!-- Hip joints -->
  <circle cx="20" cy="17" r="1.8" fill="#89c4c9"/>
  <circle cx="28" cy="17" r="1.8" fill="#89c4c9"/>

  <!-- Left leg - thigh -->
  <line x1="20" y1="17" x2="18" y2="26" stroke="#a8d8ea" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left leg - knee joint -->
  <circle cx="18" cy="26" r="1.5" fill="#89c4c9"/>
  <!-- Left leg - shin -->
  <line x1="18" y1="26" x2="17" y2="35" stroke="#a8d8ea" stroke-width="2" stroke-linecap="round"/>
  <!-- Left foot -->
  <rect x="13" y="35" width="8" height="2" rx="0.8" fill="#a8d8ea"/>

  <!-- Right leg - thigh -->
  <line x1="28" y1="17" x2="30" y2="26" stroke="#a8d8ea" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right leg - knee joint -->
  <circle cx="30" cy="26" r="1.5" fill="#89c4c9"/>
  <!-- Right leg - shin -->
  <line x1="30" y1="26" x2="31" y2="35" stroke="#a8d8ea" stroke-width="2" stroke-linecap="round"/>
  <!-- Right foot -->
  <rect x="27" y="35" width="8" height="2" rx="0.8" fill="#a8d8ea"/>

  <!-- Ground line -->
  <line x1="8" y1="38" x2="40" y2="38" stroke="#89c4c9" stroke-width="0.8" opacity="0.4"/>

  <!-- VK initials subtle -->
  <text x="24" y="45" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="6" font-weight="700" fill="#a8d8ea" opacity="0.5">VK</text>
</svg>
